# =============================================================================
# INPUT VARIABLE REFERENCE
# =============================================================================
# {contracts_full_source}   — Full Solidity source of every audited file,
#                             concatenated with file-path headers.
#                             Used by: code_quality_review_task,
#                                      security_audit_task
#
# {contracts_skeleton}      — Stripped source: only function signatures,
#                             state variable declarations, events, modifiers,
#                             and NatSpec. Function bodies omitted.
#                             Used by: threat_modeling_task
#                             NOTE: do NOT pass full source here.
#
# {slither_target}          — Path passed to the Slither CLI.
#                             Used by: static_analysis_task
#
# {project_root}            — Root directory of the contract project.
#                             Used by: static_analysis_task
#
# {contract_names}          — Comma-separated list of primary contract names.
#                             Used by: static_analysis_task
#
# {specification}           — Free-text protocol specification or README.
#                             Used by: security_audit_task, threat_modeling_task
#
# {documentation}           — Additional docs (e.g. whitepaper excerpts).
#                             Used by: security_audit_task, threat_modeling_task
#
# {known_risks}             — Risks explicitly acknowledged by the team.
#                             Used by: security_audit_task
#
# {test_code}               — Test files (TypeScript/Solidity). Optional.
#                             Used by: code_quality_review_task,
#                                      security_audit_task
#
# {protocol_type}           — e.g. "vesting", "AMM", "lending", "bridge".
#                             Used by: code_quality_review_task,
#                                      security_audit_task
#
# {chain}                   — e.g. "Ethereum", "Arbitrum", "Optimism".
#                             Used by: code_quality_review_task,
#                                      security_audit_task,
#                                      threat_modeling_task
#
# {project_name}            — Human-readable project name for the report.
#                             Used by: report_writing_task
#
# {audit_date}              — ISO date string (YYYY-MM-DD).
#                             Used by: report_writing_task
#
# {audit_scope}             — List of audited files with line counts.
#                             Used by: report_writing_task
#                             REQUIRED FORMAT (one entry per line):
#                               contracts/Vault.sol (312 lines)
#                             The report_writer extracts "(N lines)" verbatim.
#
# {deployed_address}        — On-chain address if already deployed.
#                             Optional. Used by: threat_modeling_task
#
# {pre_skipped_vectors}     — Comma-separated vector IDs pre-verified as not
#                             applicable by Python static analysis before kickoff
#                             (e.g. "V03, V05, V06, V09, V17, V19"), or "None".
#                             Used by: security_audit_task
#
# CANONICAL LOCATION SCHEMA — used by all tasks:
#   {
#     "file":       string  — relative path to the source file
#     "line_start": integer — first line of the relevant code
#     "line_end":   integer — last line (optional; omit if single-line)
#     "function":   string  — enclosing function name (omit for architecture findings)
#   }
#   Architecture-level findings use: {"file": "architecture", "line_start": 0}
# =============================================================================

code_quality_review_task:
  description: >
    Perform a code quality review of the following smart contracts:

    {contracts_full_source}

    Check for:
    1. Checks-Effects-Interactions pattern in every function with external calls.
       MANDATORY VERIFICATION PROCEDURE for CEI findings:
         a. Identify the external call (ERC20 transfer, safeTransfer, call{}, etc.).
            If NO external call exists in the function, a CEI finding is IMPOSSIBLE
            — do not emit one. Skip to the next check.
         b. Confirm that at least one state variable that guards re-entry
            (e.g. a balance, a flag, an active record) is written AFTER
            the external call. If every state update precedes the external
            call, CEI is followed — do not emit a finding.
         c. Only if step (b) finds a state write that comes after the external
            call AND that write affects a re-entrancy guard → emit a finding.
         Note: emitting an event after an external call is NOT a CEI violation.
               Events do not gate re-entry and should not be flagged as CEI issues.
    2. Pull-over-Push for ETH/token payments.
       VERIFICATION PROCEDURE:
         a. Identify every function that transfers ETH or tokens to an
            address that is user-controlled (not a fixed admin/treasury).
         b. Flag if: (i) the transfer occurs inside a loop over multiple
            recipients, OR (ii) the recipient is user-controlled and the
            transfer is inside the same function as the business logic
            rather than a separate user-initiated claim call.
         c. Do NOT flag: transfers to fixed admin or protocol addresses;
            transfers to msg.sender in a user-initiated withdrawal where
            the caller is the sole recipient of their own funds.
         d. Only if a finding is raised under (b): recommend a withdrawal
            pattern — record a claimable balance in storage and require
            the recipient to call a separate claim function to pull their funds.
            Do NOT emit this recommendation if the function is already a
            user-initiated claim where msg.sender pulls their own funds.
    3. NatSpec comments on all public and external functions.
       MANDATORY VERIFICATION PROCEDURE — follow this for every function:
         a. Scan upward from the function signature until you hit either:
            - a "/**" opening tag (NatSpec block) → function IS documented. STOP.
            - a "///" line (single-line NatSpec) → function IS documented. STOP.
            - a blank line or a closing "}" of another function → no documentation found.
         b. Only if step (a) found no "/**" or "///" → create a missing_natspec finding.
       A line like " * @notice ..." inside a /** */ block IS a valid @notice tag.
       NEVER flag a function that has /** or /// above it.
    4. Meaningful names for variables, functions, and contracts
    5. Function length (>50 lines is a red flag)
    6. Magic numbers (hardcoded values without named constants)
    7. Commented-out code and TODO comments
    8. Storage layout correctness (especially for upgradeable contracts).
       Do NOT recommend packing sub-256-bit types for fields that participate
       in multiplication or division — intermediate arithmetic on sub-256-bit
       operands is computed at operand precision and can cause a revert
       (see behavioral rules in backstory).
    9. Checked arithmetic / SafeMath:
       - Solidity ≥0.8: checked arithmetic is the default. Flag every
         `unchecked {}` block that lacks a comment explaining why overflow
         is impossible (Info/Low). Flag legacy SafeMath imports as
         Informational (dead code — remove the import).
       - Solidity <0.8: verify SafeMath is imported and applied to every
         arithmetic expression involving user-controlled values.
    10. Visibility correctness (public vs external vs internal)

    Protocol: {protocol_type}
    Chain: {chain}

    Test files (if provided — identify untested functions and missing edge cases):
    {test_code}
    If {test_code} is empty or contains only placeholder text, skip the test coverage analysis section entirely.

    OUTPUT RULES:
    - CONSOLIDATION (mandatory): if the same issue type appears in N locations,
      output EXACTLY ONE finding. List all affected functions/lines in the
      description as a bullet list.
    - Maximum 5 Informational findings total (consolidate aggressively).
    - Before writing each finding, check: have I already written a finding with the
      same title or same location? If yes — skip it.
    - When you have no more distinct issues to report, STOP.
    - Maximum 40 findings total (including the 5 Informational cap above).
    - PRIORITY AT CAP: at the 40-finding limit, preserve in severity order:
      High → Medium → Low → Informational. Within the same severity tier,
      prefer security-relevant findings (CEI, access control, overflow) over
      style and gas findings (NatSpec, naming, magic numbers).

  expected_output: >
    A JSON array of Finding objects with fields:
    id, source="code_quality", title, severity, category, location
    (file + line), description, impact, recommendation.

    Finding IDs use the format QA-NNN (3-digit zero-padded, starting at
    QA-001, incrementing sequentially: QA-001, QA-002, QA-003, ...).

    Example:
    [
      {
        "id": "QA-001",
        "source": "code_quality",
        "title": "Missing NatSpec on public function withdraw()",
        "severity": "Informational",
        "category": "missing_natspec",
        "location": {"file": "Vault.sol", "line_start": 42, "function": "withdraw"},
        "description": "...",
        "impact": "...",
        "recommendation": "..."
      }
    ]

  agent: code_quality_reviewer

static_analysis_task:
  description: >
    Process the pre-computed Slither output below into the enriched finding schema.
    Do NOT call SlitherTool — the raw data is already provided here.

    Raw Slither output:
    {static_analysis_raw}

    If tool_status.slither is "not_installed" or "error", return the object unchanged.

    Otherwise, for each entry in "findings", perform:

    1. FALSE POSITIVE FILTERING:
       - "calls-loop" whose affected function is pure or view (no state writes) →
         keep but downgrade to Informational severity.
       - "divide-before-multiply" where the code comment or context makes clear that
         integer truncation is intentional → keep but downgrade to Informational.
       - "timestamp" (indirect dependency via call chain):
         trace back to the ACTUAL timestamp-dependent comparison. Low-confidence
         timestamp findings with no realistic miner-manipulation path → Informational.
         Do NOT describe the terminal comparison as the dangerous site; name the
         upstream boundary check that uses block.timestamp.

    2. SEVERITY + CONFIDENCE NORMALIZATION:
       Use the raw "impact" and "confidence" string fields:
         Confidence string → float: High→0.9, Medium→0.6, Low→0.3
         High impact + High confidence   → High
         High impact + Medium confidence → High
         High impact + Low confidence    → Medium
         Medium impact (any confidence)  → Medium
         Low impact (any confidence)     → Low
       (Critical is determined by severity_calibration_task, not here.)

    3. SCHEMA ENRICHMENT:
       Assign sequential IDs (SA-001, SA-002, …).
       For each finding produce:
         id, source="static_analysis", title (human-readable, ≤10 words),
         severity (normalized above), category (e.g. integer_precision,
         reentrancy, access_control, …), location object with file/line_start/function,
         description (explain the vulnerability, citing the actual code site),
         impact (what can go wrong), recommendation (concrete fix),
         detector (original Slither check name), confidence (0.0–1.0 float).

  expected_output: >
    JSON with two sections:
    {
      "tool_status": {
        "slither": "success|error|not_installed"
      },
      "findings": [
        {
          "id": "SA-001",
          "source": "static_analysis",
          "title": "Divide-before-multiply in computeVestedAmount",
          "severity": "High",
          "category": "integer_precision",
          "location": {"file": "Contract.sol", "line_start": 147, "function": "computeVestedAmount"},
          "description": "...",
          "impact": "...",
          "recommendation": "...",
          "detector": "divide-before-multiply",
          "confidence": 0.8
        }
      ]
    }
    Finding IDs use the format SA-NNN (3-digit zero-padded, starting at SA-001).
    Every finding must include detector (Slither check name) and confidence (0.0-1.0 float).

  agent: static_analysis_agent

security_audit_task:
  description: >
    Perform a manual security review of the contracts.

    {contracts_full_source}

    Specification / documentation:
    {specification}

    Additional documentation:
    {documentation}
    If {documentation} is empty or 'N/A', no additional documentation was provided — proceed without it.

    Known risks disclosed by the team:
    {known_risks}
    If {known_risks} is empty or 'N/A', no team-acknowledged risks were disclosed — proceed without this input.

    Test files (use to identify what is NOT covered by tests):
    {test_code}
    If {test_code} is empty or contains only placeholder text, skip the test coverage analysis section entirely.

    Protocol: {protocol_type} on {chain}

    PROTOCOL TYPE ACTIVATION — applies ONLY if {protocol_type} contains
    "vesting", "streaming", or "lockup". For all other protocol types,
    skip this block entirely.

    When activated, these checks are MANDATORY. Run them as part of their
    mapped V-vectors; record findings under those V-IDs; include finding IDs
    in the relevant V-coverage entry's finding_ids array. Do NOT create
    separate PT-labelled findings.

    PT-A → V10: termination/revocation functions preserve earned tokens. HIGH if violated.
    PT-B → V10: activation guard completeness after deactivation. MEDIUM if violated.
    PT-C → V13: historical view functions return timestamp-scoped values only. MEDIUM per function.
    PT-D → V15: rate floor check — per-interval payout cannot be zero. MEDIUM if violated.
    PT-E → V14: fee-on-transfer: Medium, rebasing: Medium, two-address: Medium, ERC777: High (see V14.md for downgrade conditions).
    PT-F → V11: start timestamp backdating validation. MEDIUM if violated.

    === FUNCTION INVENTORY ===
    Before checking any vectors, list every non-trivial function in the contract.
    Use COMPACT single-line format — DO NOT write paragraphs:
    functionName | visibility | ext_calls(yes/no) | state_writes(yes/no) | modifiers
    === END FUNCTION INVENTORY ===
    This inventory is for your internal reasoning only. Do NOT include it
    in the JSON output and do NOT add a function_inventory key to the output object.

    SCRATCHPAD BREVITY — the scratchpad feeds your reasoning but must stay compact
    to leave room for the full 19-vector JSON output:
    - Function inventory: one line per function, no prose.
    - Per-vector notes: MAX 2 lines each (one for the finding, one for the coverage decision).
    - Do NOT write lengthy explanations in the scratchpad. Reserve detail for the JSON output.

    OUTPUT ORDER — emit the JSON as follows to avoid truncation:
    1. First emit all QUICK SKIP vectors as compact not_applicable entries.
    2. Then emit the remaining checked/flagged vectors.
    This ensures the coverage array is complete even if the response runs long.

    COVERAGE REQUIREMENT — you MUST reason through ALL 19 vectors and emit
    exactly one coverage entry per vector. Omitting a vector ID is NOT allowed.

    PRE-SKIPPED VECTORS — Python static analysis has pre-verified the following
    vector IDs as not applicable to this contract's source code:
    {pre_skipped_vectors}
    For EACH vector ID listed above: record status="not_applicable",
    summary="Pre-verified not applicable by static analysis." Do NOT call
    VectorReadTool for these vectors. If the value is "None", all 19 vectors
    apply and must be processed normally.

    VECTOR PROCEDURE — for each vector below:
    1. Check the QUICK SKIP condition (and PRE-SKIPPED VECTORS list above).
       If it applies: record status="not_applicable" with the skip reason. Proceed to the next vector.
    2. If no quick skip: call VectorReadTool with the vector ID string
         (e.g. "V07", "V14" — just the ID, no file extension).
    3. Read the entire returned content before beginning analysis for that vector.
    4. Apply the procedure to the contract using your FUNCTION INVENTORY.
    5. Record findings and your coverage entry for THIS vector.
    SEQUENTIAL ANALYSIS RULE: complete step 5 for the current vector before
    making the next VectorReadTool call. Do not batch tool calls. Do not defer
    coverage entries to the end of the run.
    6. If VectorReadTool returns an error string starting with "Error:":
         record status="tool_error",
         summary="VectorReadTool could not load the procedure for this vector."
         and continue to the next vector. Do not halt the audit.

    QUICK SKIP CONDITIONS:
    V01 — No quick skip. Always fetch V01.md and check.
    V02 — No quick skip. Always fetch V02.md and check.
    V03 — QUICK SKIP if: no call to latestRoundData, getPrice, slot0, observe,
           or any oracle interface is visible in the source. Record not_applicable.
    V04 — No quick skip. Fetch V04.md. Note: if no swap/liquidation/auction function
           exists, focus only on admin op frontrunning risk (see V04.md).
    V05 — QUICK SKIP if: no flashLoan, flashBorrow, executeFlashLoan identifier
           AND no single-transaction price-sensitive path is visible. Record not_applicable.
    V06 — QUICK SKIP if: no delegatecall to an external address (library calls via
           delegatecall are excluded), no Proxy/TransparentUpgradeableProxy/
           UUPSUpgradeable/BeaconProxy base contract, and no upgradeTo/upgradeToAndCall
           function is present. Record not_applicable.
    V07 — No quick skip. Always fetch V07.md and check all multiplications.
    V08 — No quick skip. Always fetch V08.md and check.
    V09 — QUICK SKIP if: no ecrecover, ECDSA.recover, hashTypedData, _useNonce,
           or permit function is present. Record not_applicable.
    V10 — No quick skip (escape hatch for no-asset-management contracts is in V10.md).
           Fetch V10.md and check.
    V11 — No quick skip. Always fetch V11.md and check all setters.
    V12 — No quick skip. Always fetch V12.md and check.
    V13 — No quick skip. Always fetch V13.md and check.
    V14 — No quick skip. Always fetch V14.md and check all four sub-checks.
    V15 — No quick skip. Always fetch V15.md and check.
    V16 — No quick skip. Always fetch V16.md and check.
    V17 — QUICK SKIP if: source code contains no initialize(), no upgradeTo/
           upgradeToAndCall, and no Proxy/TransparentUpgradeableProxy/
           UUPSUpgradeable/BeaconProxy base contract. Record not_applicable.
    V18 — No quick skip. Always fetch V18.md and check.
    V19 — QUICK SKIP if: {specification} is empty, a single sentence, or
           clearly a placeholder (e.g. "N/A", "TBD", "not provided").
           Record not_applicable, summary="No formal specification provided."

    Every finding MUST include an exact line number.
    Distinguish confirmed vs potential vulnerabilities.
    Aim for ≤30 findings. Never omit a confirmed High or Critical to meet the limit.
    If at the cap, drop lowest-severity findings first: remove Informational first,
    then Low, then Medium — preserving all High and Critical.

  expected_output: >
    A JSON object with THREE keys: `coverage`, `findings`, and `contract_pragma`.

    `contract_pragma` — the Solidity pragma string from the primary audited contract,
    e.g. "^0.8.17" or "0.8.0". Extract from the pragma directive in the source.
    If multiple contracts have different pragmas, use the most restrictive
    (lowest minimum compiler version across all audited files — e.g. ^0.8.0
    is more restrictive than >=0.8.4 <0.9.0 because its minimum is 0.8.0).
    If pragma cannot be determined, set to "unknown".

    `coverage` is an array of exactly 19 entries — one per vector V01–V19.
    Coverage entry summary MUST be ≤15 words. Be terse.
    {
      "vector_id": "V01",
      "vector": "reentrancy",
      "status": "checked" | "flagged" | "not_applicable" | "tool_error",
      "summary": "One sentence: what was verified or why not applicable.",
      "finding_ids": ["MAN-001"]
    }

    `findings` is an array of Finding objects with source="manual_review".
    Finding IDs: MAN-NNN (3-digit zero-padded, start at MAN-001).
    confidence 0.0-1.0: 1.0 = 100% exploitable, 0.5 = requires further analysis.

    Every finding MUST include all of the following fields.
    `title` is MANDATORY and must be a non-empty string — never omit it.

    Finding object shape:
    {
      "id": "MAN-001",
      "source": "manual_review",
      "title": "Short descriptive title (REQUIRED — never empty)",
      "severity": "Critical|High|Medium|Low|Informational",
      "category": "reentrancy|overflow|access_control|dos|...",
      "confidence": 0.0,
      "location": {
        "file": "Contract.sol",
        "line_start": 42,
        "line_end": 55,
        "function": "withdraw"
      },
      "description": "What is wrong and why it matters.",
      "impact": "Concrete impact on funds or protocol state.",
      "recommendation": "How to fix it."
    }

    Full output shape:
    {
      "contract_pragma": "^0.8.17",
      "coverage": [ /* 19 entries, V01 through V19 */ ],
      "findings": [ /* Finding objects, each with a non-empty title */ ]
    }

    Emit ONLY the JSON object. Do not add any explanation, prose, or commentary outside the JSON fence.

  agent: security_auditor

threat_modeling_task:
  description: >
    Perform threat modeling at the architecture level.

    {contracts_skeleton}
    Specification: {specification}
    Documentation: {documentation}
    If {documentation} is empty or 'N/A', no additional documentation was provided — proceed without it.
    Chain: {chain}
    Deployed address (if any): {deployed_address}

    Analyze:
    1. CENTRALIZATION: what privileged roles exist?
       Are they controlled by multisig or EOA?
       Is there a timelock on critical operations?

    2. UPGRADEABILITY: which proxy pattern is used?
       Is storage collision possible? Is there a storage layout test?
       Who controls the upgrade?

    3. EXTERNAL DEPENDENCIES: oracles, external protocols.
       What happens if Chainlink goes stale? If a Uniswap pool is manipulated?

    4. ECONOMIC SECURITY: can the protocol be broken economically?
       Governance attacks, flash loan voting?

    5. ON-CHAIN VERIFICATION: if deployed_address is provided — use
       EtherscanTool to verify the on-chain configuration.
       If EtherscanTool is unavailable or returns an error, set
       etherscan_status: "not_available" in your output and proceed
       without on-chain verification. Do NOT fabricate on-chain data.

    6. L2 / CHAIN-SPECIFIC RISKS: if {chain} is Arbitrum, Optimism, Base,
       zkSync, or another L2 —
       - Sequencer downtime: does the protocol have a fallback if the L2
         sequencer is offline?
       - L2 block.timestamp may differ from L1 finality; flag protocols
         that rely on timestamp precision for auction deadlines or vesting
         cliffs as an architecture-level concern (no line number required).
       - block.number semantics (e.g. Arbitrum increments per transaction):
         if state variable names suggest block-counted time windows, emit
         an Informational architectural note only — do NOT emit Medium or
         above. Without function bodies, block-number usage cannot be
         confirmed as unsafe vs. a legitimate epoch counter. Code-level
         confirmation is deferred to V16 in the security audit.

    Aim for ≤15 findings. Merge related architectural concerns.
    Never omit a confirmed High or Critical.
    If at the cap, drop lowest-severity findings first: remove Informational first,
    then Low, then Medium — preserving all High and Critical.

  expected_output: >
    A JSON object with two keys:
    {
      "etherscan_status": "success|not_available|error",
      "findings": [
        /* Finding objects with source="threat_model" */
      ]
    }

    etherscan_status values:
      "success"       — EtherscanTool ran and returned on-chain data.
      "not_available" — EtherscanTool unavailable, errored, or no deployed_address provided.
      "error"         — Tool returned an unexpected error response.

    Finding IDs use the format TM-NNN (3-digit zero-padded, start at TM-001).
    Each finding must have: id, source, title, severity, category,
    location, description, impact, recommendation.

    Location format:
    - Code-level: {"file": "Contract.sol", "line_start": 42, "function": "withdraw"}
    - Architecture-level: {"file": "architecture", "line_start": 0, "function": ""}

    Emit ONLY the JSON object. Do not add any explanation, prose, or commentary outside the JSON fence.

  agent: threat_modeler

dedup_task:
  description: >
    Consolidate findings from all four upstream agents into a clean,
    deduplicated list. Filter structural invalids and technical impossibilities.

    You receive:
    - Code Quality Review — JSON array of QA-xxx findings
    - Static Analysis (Slither) — {"tool_status": {...}, "findings": [...]}
    - Manual Security Audit — {"contract_pragma": "...", "coverage": [...], "findings": [...]}
    - Threat Modeling — {"etherscan_status": "...", "findings": [...]}

    Read findings from the "findings" key of each structured output.
    Extract contract_pragma from the security audit output.
    Extract etherscan_status from the threat modeling output.

    EXECUTION PROTOCOL — write your scratchpad between
    === SCRATCHPAD START === and === SCRATCHPAD END === markers.
    The scratchpad is required and is NOT part of the JSON output.
    After the scratchpad, output the final JSON inside a ```json ... ``` code fence.

    Inside the scratchpad, complete these three phases:
    PHASE 1 — INVENTORY
      List every finding ID from all four upstream tasks:
      [ID] | source | title (truncated) | severity

    PHASE 2 — SEMANTIC CLUSTERS
      For each group sharing a location range and root cause:
      CLUSTER: [ID1, ID2, ...] → root cause: <one sentence> → keep: <ID>

    PHASE 3 — TITLE GROUPS AND ARCHITECTURE CLUSTERS
      Remaining findings with identical or near-identical titles:
      COLLAPSE [ID1, ID2, ...] → keep: <ID>, merge locations.
      Architecture clusters by actor:
      CLUSTER-ARCH [TM-xxx, TM-yyy, ...] → actor: <name> → canonical ID: <highest-severity ID>

    Steps:

    0. COVERAGE AUDIT (run first):
       Extract the `coverage` array from the Manual Security Audit output.
       Expected vector IDs: V01 V02 V03 V04 V05 V06 V07 V08 V09 V10
                            V11 V12 V13 V14 V15 V16 V17 V18 V19
       a. List IDs present in the coverage array (any status counts as present).
       b. List IDs that are completely absent from the array (no entry at all).
          A vector with status "not_applicable", "checked", "flagged", or
          "tool_error" is NOT a gap —
          it has been reviewed. Only a vector with no entry in the array is a gap.
       c. Record truly absent IDs in stats_partial.coverage_gaps.
          If all 19 vectors have entries, set coverage_gaps to [].
       d. For each truly absent vector (no entry at all), create one Informational finding:
          id: PR-NNN (sequential), source="peer_review",
          title="Security vector <VXX> not covered in audit",
          severity="Informational", category="coverage_gap",
          location={file: "audit_process", line_start: 0},
          description="Vector <VXX> (<label>) had no entry in the security
          audit coverage matrix. Verify it was deliberately omitted."

    1. DEDUPLICATION:
       PRIMARY PASS — SEMANTIC DEDUP (run first):
         Find pairs sharing the same root cause AND overlapping location.
         Two findings share a root cause if they describe the same deficient
         code path or the same absent guard, even if worded differently.
         Title similarity is NOT required — compare the cited function name
         and the described mechanism. If two findings cite the same function
         with the same impact direction (e.g. both describe unchecked admin
         grant in setAdmin, or both describe the same arithmetic bug in
         _baseVestedAmount), they MUST be merged regardless of phrasing.
         Merge into the higher-severity entry; add "(also reported as <ID>)" note.
         The merged entry retains the source of the higher-severity finding.
         If both have equal severity, prefer: manual_review > static_analysis
         > code_quality > threat_model.
         Verify: no two remaining findings share both location and root cause.
       SECONDARY PASS — TITLE COLLAPSE:
         Group by title (case-insensitive). Collapse groups with count > 1 into
         ONE finding with all locations as a bullet list.
       TERTIARY PASS — ARCHITECTURE CLUSTERS:
         Scan source="threat_model" findings with location.file="architecture".
         Group by shared privileged actor AND related categories
         (centralization, missing timelock, no multisig, unlimited privilege).
         For each group with count > 1:
           - Merge into ONE finding titled "Centralization Risk — [actor name]".
           - Sub-concerns as bullet list in description.
           - Canonical ID = ID of the highest-severity finding in the group.
           - Mark others as duplicate_of the canonical ID.
           - Set source="threat_model", severity = highest in group.
           - The merged finding passes through calibration gates unchanged by this merge.
       POST-MERGE INFORMATIONAL CHECK:
         After all merging, no single issue type may appear more than once as
         an Informational finding. Verify each remaining Informational entry
         has a distinct root cause and a specific line reference.
         Before writing the final JSON, confirm in your scratchpad that no
         single issue type appears more than once as an Informational finding,
         then set informational_dedup_confirmed=true in stats_partial.

    2. FILTERING (apply during dedup, in this order):
       a. MISSING LOCATION REJECTION:
          Findings where location is entirely absent: set status="rejected",
          rejection_reason="missing_location". Exclude from output.
          EXCEPTION: source="threat_model" + location.file="architecture" +
          location.line_start=0 → valid architecture findings, accept as-is.

       b. SOL08-OVERFLOW FILTER:
          For any finding from manual_review or static_analysis describing
          arithmetic that "wraps around" or "silently overflows":
            - Extract contract_pragma from the security audit output.
            - If pragma is ≥0.8.0 AND flagged arithmetic is NOT in an `unchecked {}` block:
              Solidity checked arithmetic will REVERT, not wrap. Set status="rejected",
              rejection_reason="false_positive: Solidity ≥0.8 checked arithmetic
              reverts on overflow; no wrap-around occurs outside unchecked blocks."
            - EXCEPTION: if the finding explicitly describes a REVERT (not wrap-around)
              — e.g. the V07 intermediate type truncation pattern — do NOT reject.
              A revert that permanently bricks a withdrawal is a valid High finding.
            - If pragma is <0.8.0 OR arithmetic is inside `unchecked {}` OR pragma is
              "unknown": pass the finding through unchanged.

       c. REENTRANCY-FP FILTER:
          If a MAN finding for function F explicitly confirms F follows CEI
          (all state writes precede the external call), AND an SA finding for
          the same function F carries a reentrancy detector result:
          The SA finding is a false positive. Downgrade to Informational and
          replace description with: "The function currently follows CEI.
          Consider adding a nonReentrant modifier as a defense-in-depth measure."
          Do NOT retain the SA reentrancy finding at High or Medium.

    3. OUTPUT PREPARATION:
       Produce the deduplicated list. Do NOT assign needs_poc here — that is
       the calibration task's job. Preserve all source IDs exactly.

  expected_output: >
    {
      "deduplicated_findings": [ /* Finding array, severity order preserved from sources */ ],
      "stats_partial": {
        "total_before": N,
        "duplicates_removed": N,
        "rejected": N,
        "coverage_gaps": [],
        "etherscan_status": "success|not_available|error",
        "informational_dedup_confirmed": true
      },
      "contract_pragma": "^0.8.17"
    }

    ID prefixes by source:
      QA-xxx  → code_quality_reviewer
      SA-xxx  → static_analysis_agent
      MAN-xxx → security_auditor
      TM-xxx  → threat_modeler
      PR-xxx  → peer_reviewer (coverage-gap findings only)

    Emit the scratchpad (between === SCRATCHPAD START === and === SCRATCHPAD END ===
    markers), then the final JSON object inside a ```json ... ``` fence. No other prose.

  agent: peer_reviewer
  context:
    - code_quality_review_task
    - static_analysis_task
    - security_audit_task
    - threat_modeling_task

severity_calibration_task:
  description: >
    Apply all severity gates to the deduplicated finding list.
    Produce the final calibrated finding list with needs_poc set.

    You receive from dedup_task:
    - deduplicated_findings: the clean, merged finding list
    - stats_partial: coverage gaps, counts, etherscan_status
    - contract_pragma: the Solidity pragma of the audited contracts

    EXECUTION PROTOCOL — write your scratchpad between
    === SCRATCHPAD START === and === SCRATCHPAD END === markers.
    The scratchpad is required. After it, output JSON inside a ```json ... ``` fence.

    Inside the scratchpad, complete PHASE 4 only:
    PHASE 4 — GATE CHECKLIST
      Note: record gate: NO-CHANGE for findings that pass all gates unchanged.
      For each surviving finding, record one line per gate applied:
      [ID] | severity_in → severity_out | gate: <gate name> | reason: <one phrase>

      Gate names:
        NORMALIZATION       (step 2)  — severity scale enforcement / unbounded-array floor
        REENTRANCY-CEI-ONLY (step 3a) — CEI-only reentrancy capped or downgraded
        NEG-CLAIM           (step 3b) — negative assertion without quoted evidence, severity reduced
        CONFIDENCE          (step 3c) — manual_review confidence < 0.3, severity reduced one level
        REC-VALIDITY        (step 3d) — recommendation technically invalid, finding dropped
        NON-UPGRADE-FP      (step 3e) — non-upgradeability flagged as vulnerability, downgraded
        CRITICAL-GATE       (step 4)  — critical criteria not all met, downgraded
        CRITICAL-MATH-PROOF (step 4)  — critical quantitative claim lacks inline arithmetic proof
        CODE-DEFECT         (step 4)  — admin harm triggerable by normal usage, no downgrade applied
        DOWNGRADE           (step 4)  — admin malice required, severity capped at Medium
        MULTI-PRECONDITION  (step 4)  — two+ independent preconditions, severity capped at Medium
        MATH-CHECK          (step 5)  — quantitative claim arithmetic verified or corrected
        ACCOUNTING-GATE     (step 5)  — variable non-decrement analysed (same/different pool)
        UNUSED-VAR          (step 6)  — dead code claim verified against logical reads
        NO-CHANGE                     — finding passed all gates without modification

      Every surviving finding must have at least one line.
      Multiple gates on one finding: one line per gate, in application order.

    Steps:

    1. READ INPUT:
       From dedup_task context, extract:
       - deduplicated_findings: the finding list to calibrate
       - stats_partial.duplicates_removed, stats_partial.rejected,
         stats_partial.coverage_gaps, stats_partial.etherscan_status,
         stats_partial.informational_dedup_confirmed
       - contract_pragma: the Solidity version string (used in step 3d)
       Copy all stats_partial values directly into your output stats object.
       Set stats.gates_applied to the count of gate applications that changed a severity.

    2. SEVERITY NORMALIZATION:
       Critical: direct loss of funds, no preconditions
       High: loss of funds under realistic conditions
       Medium: logic bugs, no direct financial loss
       Low: best practice violations, minor risks
       Info: observations

       QA SEVERITY CEILING (MANDATORY):
       Findings with source="code_quality" have a MAXIMUM severity of Low.
       Missing NatSpec, redundant imports, commented-out code, magic numbers,
       naming issues, and style observations are NEVER Medium or above.
       The ONLY exception: if a code_quality finding independently satisfies
       a genuine exploitable vulnerability criterion under its own evidence
       (specific line numbers demonstrating exploitability) — reclassify it
       as source="manual_review", set reclassified=true on the finding object,
       include that evidence quoted in the description, and apply normal gates.
       In all other cases: hard cap at Low.

       SA SEVERITY FLOOR (MANDATORY):
       Findings with source="static_analysis" may not be downgraded more than
       ONE level below their Slither-reported severity without an inline
       arithmetic proof showing the impact is negligible under realistic inputs.
       A divide-before-multiply finding in a token amount path is a financial
       precision loss — it defaults to High and requires arithmetic proof of
       negligible impact to downgrade below High.
       The NEG-CLAIM gate and the CONFIDENCE gate do NOT apply to SA findings:
       SA findings are tool-verified; there is no "negative assertion" to confirm,
       and SA confidence values reflect detector reliability, not exploitability.

       MANDATORY — UNBOUNDED ARRAY IN VIEW FUNCTION:
       If any finding describes an unbounded storage array iterated inside an
       external or public view function with no on-chain pagination and no hard
       size cap — minimum severity is MEDIUM. Override any upstream Low/Info rating.
       Confirm: (a) array grows on every record creation with no pruning path,
       (b) read by a view getter external callers use,
       (c) no on-chain pagination or hard size cap.

    3. VALIDATION GATES (apply in this order to each finding):

       a. REENTRANCY-CEI-ONLY GATE:
          Applies when a MAN reentrancy finding cites ONLY a CEI pattern violation
          (no Tier 2 read-only path, no Tier 3 cross-contract path identified).
          Does NOT apply if: a Tier 3 cross-contract exploit path is described,
          the token is ERC777 or has custom hooks, the contract implements flash
          loan callbacks, or the token interface is ambiguous/unstated.
          In all excluded cases: finding passes this gate unchanged.
          When the gate applies, evaluate in order:
            1. If flagged function has `nonReentrant`: downgrade to Informational.
               Replace description with: "CEI ordering violation with nonReentrant
               guard present. Guard fully prevents Tier 1 re-entry; defense-in-depth
               observation only."
            2. If no `nonReentrant` AND finding explicitly states the only token
               interface is standard ERC20 via SafeERC20 (no hooks, no callbacks):
               cap severity at High; do not allow Critical. Add to description:
               "No callback path via standard SafeERC20. Critical requires an
               unconditional exploit path; hookable token precondition caps at High."

       b. NEG-CLAIM GATE (applies ONLY to source="manual_review" findings):
          For any MAN finding whose description contains: "does not check",
          "does not validate", "fails to verify", "missing guard", "no restriction on",
          or "missing check for" — confirm the finding includes quoted evidence that
          the upstream agent inspected the cited function body (specific line numbers
          or function body content confirming absence).
          If no such evidence is present:
            - Reduce severity by one level (Critical→High, High→Medium, Medium→Low).
            - Add: "(NEG-CLAIM: negative assertion not confirmed with quoted function
              body — severity reduced one level.)"
          Note: this gate does NOT apply to QA or SA findings. QA findings are
          pattern observations; SA findings are tool-verified results.

       c. CONFIDENCE DOWNGRADE (applies ONLY to source="manual_review" findings):
          If confidence < 0.3: lower severity by one level.
          SA confidence values (0.3/0.6/0.9) reflect detector reliability, not
          exploitability. Do NOT downgrade SA findings based on confidence.

       d. RECOMMENDATION VALIDITY:
          For each finding, verify the recommendation is technically valid for
          the Solidity version and EVM context of the audited contract
          (use contract_pragma from dedup_task output).
          Drop any finding whose recommendation contradicts how the language or
          EVM actually works — do not attempt to fix it, just drop it.

       e. NON-UPGRADEABILITY FALSE POSITIVE:
          If any finding from source="threat_model" describes the absence of an
          upgrade mechanism as a vulnerability (no proxy, immutable contract, no
          admin upgrade path) and rates it Medium or above:
          Downgrade to Informational unless the finding explicitly identifies a
          confirmed bug that immutability prevents from being fixed.
          Immutability is a deliberate design choice, not a finding.

    4. CRITICAL SEVERITY GATE:
       Before accepting any finding with severity=Critical, verify ALL THREE:
       a. Direct fund-loss path exists (concrete, not hypothetical)?
       b. No special preconditions (not "only if owner is malicious")?
       c. Exploit flow describable in one sentence?
       If any answer is NO → downgrade to High or Medium.
       Findings about naming, constants, or documentation are NEVER Critical.

       CRITICAL-MATH-PROOF GATE: If the Critical finding's exploit depends on a
       quantitative threshold (e.g. "overflow occurs when value exceeds N",
       "precision loss accumulates to Y tokens") — the finding description MUST
       include explicit step-by-step arithmetic demonstrating the threshold is
       reachable under realistic token amounts, decimal counts, and time windows.
       If the calculation is absent → downgrade to High pending arithmetic proof.
       Record as: gate: CRITICAL-MATH-PROOF | reason: quantitative claim without inline proof.
       Note: for High and Medium quantitative claims, arithmetic verification is
       handled by step 5 MATH-CHECK below.

       CODE DEFECT vs ADMIN MALICE — mandatory before applying DOWNGRADE:
       Answer: "Can a well-intentioned admin, following normal documented usage,
       trigger this harm?"
         - YES → CODE DEFECT. Do NOT downgrade. Severity reflects the defect.
         - NO (harm requires consciously abusive action) → apply DOWNGRADE.

       MANDATORY DOWNGRADE RULE — Centralization / admin privilege risk:
       If the only exploitation path requires the owner/admin to act maliciously:
       maximum severity is MEDIUM. "Malicious insider" is a precondition.
       Examples that MUST be Medium: "Owner can change fee to 100% with no timelock",
       "Admin can call setRewardRate(0) to stop rewards", "No multisig on privileged role."

       MULTI-PRECONDITION SEVERITY CAP:
       If exploit requires two or more independent external preconditions simultaneously
       (e.g. non-standard token type AND privileged actor malice): cap at Medium.
       This applies on top of DOWNGRADE — compound precondition path is never High or Critical.

    5. MATHEMATICAL VERIFICATION:
       For findings with quantitative claims, verify the arithmetic explicitly.
       Example: if fee constants sum to 1000 and divisor is 10000,
       total fee = 10%, net = 90% — a finding claiming "net is zero" must be removed.
       Include the inline calculation in the finding description.

       ACCOUNTING INVARIANT GATE — before accepting a finding that "variable X
       is not decremented after a token transfer":
         STEP 0 — FAST EXIT:
         If the description does not explicitly name BOTH variable X AND the pool
         the transfer draws from: classify as INCONCLUSIVE and pass through unchanged.
         Do not infer pool identity from variable names alone.
         NOTE: you do NOT have access to raw contract source.
         a. From the description, identify what pool X tracks.
         b. Identify what pool the transfer draws FROM.
         c. SAME pool → X must be decremented; if not, emit accounting finding.
            DIFFERENT pool → X not being decremented is CORRECT. Drop the finding.
            INCONCLUSIVE → pass through unchanged.

    6. UNUSED VARIABLE / DEAD CODE CLAIMS:
       Before accepting a finding that a state variable is "unused" or "dead code":
       - Classify every read site:
           LOGICAL read (in conditional, arithmetic, return, non-event call) →
           variable affects behavior → DROP the finding.
           OBSERVATIONAL read (only in emit SomeEvent(...)) → does not affect behavior.
       - If any LOGICAL read exists: drop the finding.
       - If only observational reads or none: valid finding; emit as Informational,
         category="gas_optimization". Note the event location.

    7. SET needs_poc:
       Critical and High → needs_poc=true.
       All other severities → needs_poc=false.
       Add this boolean field directly to each Finding object.
       The report_writer omits the PoC section when needs_poc=false or absent.

    8. FINAL ORDERING:
       Sort calibrated_findings in descending severity order:
       Critical → High → Medium → Low → Informational.
       PRESERVE all original source IDs (QA-xxx, MAN-xxx, SA-xxx, TM-xxx, PR-xxx).
       Do NOT renumber to F-001, F-002, etc.

  expected_output: >
    {
      "calibrated_findings": [ /* sorted Finding array with needs_poc on each */ ],
      "stats": {
        "total_before": N,
        "duplicates_removed": N,
        "rejected": N,
        "gates_applied": N,
        "by_severity": {"Critical": N, "High": N, "Medium": N, "Low": N, "Informational": N},
        "coverage_gaps": [],
        "etherscan_status": "success|not_available|error",
        "informational_dedup_confirmed": true
      }
    }

    Emit the scratchpad (between === SCRATCHPAD START === and === SCRATCHPAD END ===
    markers), then the final JSON object inside a ```json ... ``` fence. No other prose.

  agent: severity_calibrator
  context:
    - dedup_task

report_writing_task:
  description: >
    Write the final audit report.

    Project: {project_name}
    Date: {audit_date}

    Audited files:
    {audit_scope}

    Use findings from severity_calibration_task.
    The canonical finding list is in `calibrated_findings` (not `deduplicated_findings`).

    ID CONSISTENCY REQUIREMENT: use canonical IDs from calibrated_findings[].id verbatim.
    Do NOT invent local temporary IDs (e.g. "F-001"). If secondary numbering is needed,
    include the canonical ID in the heading: "[MAN-003] 1. Integer Overflow...".

    ## Markdown report structure:

    # Smart Contract Audit Report — {project_name}

    ## Executive Summary
    Write 3-5 sentences in non-technical language describing what the protocol
    does and what the audit found.

    Then output a deployment verdict on its own line using EXACTLY this format:

    **Deployment Verdict: <VERDICT>** — <one-sentence rationale>

    Verdict rules (apply the first that matches):
    - **NOT RECOMMENDED FOR DEPLOYMENT** — one or more Critical findings present.
    - **CONDITIONAL — FIXES REQUIRED** — no Criticals, but one or more High or
      Medium findings present.
    - **LOW RISK** — only Low and/or Informational findings present, or no
      findings at all after deduplication.

    After the verdict line, add this disclaimer verbatim:
    > This verdict reflects automated multi-agent analysis only and does not
    > substitute for a full manual audit by a qualified security firm.

    ## Scope
    A table listing the audited files. Use ONLY the data from "Audited files" above.
    Columns: File | Lines | Notes
    CRITICAL: "Lines" must be copied EXACTLY from the "(N lines)" figure in the input.
    "Notes" = one short phrase describing the contract's purpose.
    Do NOT put findings or JSON data in this table.

    ## Methodology
    This audit was conducted by an AI-based multi-agent system (SCAuditCrew).
    The pipeline includes automated static analysis via Slither, AI-driven manual
    code review with per-vector procedure files, threat modelling, semantic
    deduplication, and severity calibration. Only mention tools that are part
    of this pipeline: Slither and the SCAuditCrew AI multi-agent system. Do not
    mention other tools or human auditors.
    If the static analysis output shows tool_status.slither is "not_installed",
    state that static analysis was attempted but the Slither tool was unavailable
    for this audit run, and omit any claim that Slither results were obtained.

    ## Findings Summary
    | ID | Title | Severity |
    Use severity icons: 🔴 Critical · 🟠 High · 🟡 Medium · 🔵 Low · ⚪ Informational
    If calibrated_findings is empty, write "No findings were identified" in this
    section, set the deployment verdict to LOW RISK, and omit the Detailed Findings
    section entirely.

    ## Detailed Findings
    For each finding:
    ### [MAN-001] 🔴 Critical — Title
    **Location:** file:line
    **Description:** ...
    **Impact:** ...
    *(Only for findings where needs_poc=true — insert a **Proof of Concept:** section
    with a minimal concrete exploit scenario constructed directly from the description
    and impact fields of the finding. Do not invent exploit steps not implied by
    those fields. Omit entirely when needs_poc=false.)*
    **Recommendation:** ...

    ## General Recommendations
    (5-7 general security improvement recommendations)

  expected_output: >
    A complete Markdown audit report. Pure Markdown only — no JSON blocks.

  agent: report_writer
  context:
    - severity_calibration_task
